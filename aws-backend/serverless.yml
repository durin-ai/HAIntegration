service: homeassistant-cloud-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 256
  timeout: 30
  
  # Environment variables available to all functions
  environment:
    TABLE_NAME: ${self:service}-${self:provider.stage}-data
    EVENT_BUS_NAME: ${self:service}-${self:provider.stage}-events
    API_GATEWAY_URL: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${self:provider.stage}"
  
  # IAM permissions
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchWriteItem
          Resource:
            - !GetAtt DataTable.Arn
            - !Sub "${DataTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - !GetAtt EventBus.Arn
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: !Ref NotificationTopic
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "*"

functions:
  register:
    handler: lambda/register.handler
    description: "Register a new Home Assistant installation"
    events:
      - http:
          path: ha/register
          method: post
          cors: true
    environment:
      NOTIFICATION_TOPIC_ARN: !Ref NotificationTopic

  sync:
    handler: lambda/sync.handler
    description: "Sync devices and entities from Home Assistant"
    events:
      - http:
          path: ha/sync
          method: post
          cors: true
    timeout: 60  # Longer timeout for bulk operations

  webhook:
    handler: lambda/webhook.handler
    description: "Webhook endpoint for bidirectional communication"
    events:
      - http:
          path: webhook/{webhook_id}
          method: post
          cors: true
          request:
            parameters:
              paths:
                webhook_id: true

  eventProcessor:
    handler: lambda/eventbridge-processor.handler
    description: "Process EventBridge events for automation and monitoring"
    events:
      - eventBridge:
          eventBus: !Ref EventBus
          pattern:
            source:
              - homeassistant.integration
            detail-type:
              - DevicesSynced
              - InstallationRegistered
              - CommandSent
              - StatusUpdate
    environment:
      NOTIFICATION_TOPIC_ARN: !Ref NotificationTopic

resources:
  Resources:
    # DynamoDB Table for storing installation, device, and entity data
    DataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-data
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # Custom EventBridge Bus for Home Assistant events
    EventBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: ${self:service}-${self:provider.stage}-events
        Description: "EventBridge bus for Home Assistant integration events"
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # SNS Topic for notifications (optional)
    NotificationTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-${self:provider.stage}-notifications
        DisplayName: "Home Assistant Cloud Notifications"
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # CloudWatch Log Groups with retention
    RegisterLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${self:provider.stage}-register
        RetentionInDays: 14

    SyncLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${self:provider.stage}-sync
        RetentionInDays: 14

    WebhookLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${self:provider.stage}-webhook
        RetentionInDays: 14

    EventProcessorLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${self:provider.stage}-eventProcessor
        RetentionInDays: 30

  Outputs:
    ApiGatewayUrl:
      Description: "API Gateway endpoint URL"
      Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${self:provider.stage}"
    
    DynamoDBTableName:
      Description: "DynamoDB table name"
      Value: !Ref DataTable
      
    EventBusArn:
      Description: "EventBridge bus ARN"
      Value: !GetAtt EventBus.Arn
      
    NotificationTopicArn:
      Description: "SNS notification topic ARN"
      Value: !Ref NotificationTopic

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
    websocketPort: 3001