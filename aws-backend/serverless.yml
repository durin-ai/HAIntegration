service: durin-mqtt-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 256
  timeout: 30
  
  # Environment variables available to all functions
  environment:
    TABLE_NAME: ${self:service}-${self:provider.stage}-data
    EVENT_BUS_NAME: ${self:service}-${self:provider.stage}-events
    IOT_ENDPOINT: !GetAtt IotEndpointProvider.IotEndpoint
  
  # IAM permissions
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchWriteItem
          Resource:
            - !GetAtt DataTable.Arn
            - !Sub "${DataTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - !GetAtt EventBus.Arn
        - Effect: Allow
          Action:
            - iot:Publish
            - iot:Subscribe
            - iot:Connect
            - iot:Receive
          Resource: "*"
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: !Ref NotificationTopic
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "*"

functions:
  mqttProcessor:
    handler: lambda/mqtt-processor.handler
    description: "Process MQTT messages from Home Assistant installations"
    timeout: 60
    environment:
      NOTIFICATION_TOPIC_ARN: !Ref NotificationTopic
    # Triggered by IoT Rule

  eventProcessor:
    handler: lambda/eventbridge-processor.handler
    description: "Process EventBridge events for automation and monitoring"
    events:
      - eventBridge:
          eventBus: !Ref EventBus
          pattern:
            source:
              - durin.mqtt
            detail-type:
              - DevicesSynced
              - InstallationRegistered
              - CommandReceived
              - StatusUpdate
    environment:
      NOTIFICATION_TOPIC_ARN: !Ref NotificationTopic

resources:
  Resources:
    # DynamoDB Table for storing installation, device, and entity data
    DataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-data
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # Custom EventBridge Bus for Durin events
    EventBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: ${self:service}-${self:provider.stage}-events
        Description: "EventBridge bus for Durin MQTT integration events"
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # SNS Topic for notifications
    NotificationTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-${self:provider.stage}-notifications
        DisplayName: "Durin MQTT Notifications"
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # AWS IoT Core Topic Rule for MQTT messages
    IoTTopicRule:
      Type: AWS::IoT::TopicRule
      Properties:
        RuleName: ${self:service}_${self:provider.stage}_mqtt_rule
        TopicRulePayload:
          Sql: "SELECT * FROM 'durin/ha/+/#'"
          Description: "Route all Durin MQTT messages to Lambda processor"
          Actions:
            - Lambda:
                FunctionArn: !GetAtt MqttProcessorLambdaFunction.Arn
          RuleDisabled: false

    # Permission for IoT Rule to invoke Lambda
    IoTRuleLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName: !Ref MqttProcessorLambdaFunction
        Action: lambda:InvokeFunction
        Principal: iot.amazonaws.com
        SourceArn: !GetAtt IoTTopicRule.Arn

    # Custom resource to get IoT endpoint
    IotEndpointProvider:
      Type: Custom::IotEndpoint
      Properties:
        ServiceToken: !GetAtt IotEndpointFunction.Arn

    # Lambda to retrieve IoT endpoint
    IotEndpointFunction:
      Type: AWS::Lambda::Function
      Properties:
        FunctionName: ${self:service}-${self:provider.stage}-iot-endpoint
        Runtime: python3.9
        Handler: index.handler
        Role: !GetAtt IotEndpointFunctionRole.Arn
        Code:
          ZipFile: |
            import boto3
            import cfnresponse
            
            def handler(event, context):
                try:
                    if event['RequestType'] == 'Delete':
                        cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                        return
                    
                    client = boto3.client('iot')
                    response = client.describe_endpoint(endpointType='iot:Data-ATS')
                    endpoint = response['endpointAddress']
                    
                    cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                        'IotEndpoint': endpoint
                    })
                except Exception as e:
                    print(f"Error: {e}")
                    cfnresponse.send(event, context, cfnresponse.FAILED, {})

    # IAM Role for IoT Endpoint Function
    IotEndpointFunctionRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        Policies:
          - PolicyName: IoTDescribeEndpoint
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - iot:DescribeEndpoint
                  Resource: '*'

    # CloudWatch Log Groups
    MqttProcessorLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${self:provider.stage}-mqttProcessor
        RetentionInDays: 14

    EventProcessorLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${self:provider.stage}-eventProcessor
        RetentionInDays: 30

  Outputs:
    IoTEndpoint:
      Description: "AWS IoT Core endpoint for MQTT connections"
      Value: !GetAtt IotEndpointProvider.IotEndpoint
    
    DynamoDBTableName:
      Description: "DynamoDB table name"
      Value: !Ref DataTable
      
    EventBusArn:
      Description: "EventBridge bus ARN"
      Value: !GetAtt EventBus.Arn
      
    NotificationTopicArn:
      Description: "SNS notification topic ARN"
      Value: !Ref NotificationTopic

    IoTTopicRuleName:
      Description: "IoT Topic Rule name"
      Value: !Ref IoTTopicRule

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
    websocketPort: 3001